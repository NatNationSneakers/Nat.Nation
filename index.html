<!DOCTYPE html>
<html>
<head>
    <title>Nat Nation Sneakers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   
<div id="loader">
    <img src="logo.png" class="logo-loader">
</div>

<div id="contenido">

<!-- 🔥 PANTALLA 1 (INICIO) -->
<div id="inicio">
    <img src="logo.png" class="logo-loader">
    <h1>Nat Nation</h1>
    <p>ENERGÍA · CONFORT · ESTILO</p>
    <button onclick="entrar()">Entrar</button>
</div>

<!-- 🔥 PANTALLA 2 (TIENDA) -->
<div id="tienda">

<div id="panel-carrito">
    <button onclick="toggleCarrito()" class="btn-cerrar">
    ⬅️ Regresar
</button>

    <h2> 🛒 Tu carrito</h2>
    <ul id="lista-carrito"></ul>
</div>

<button class="btn-regresar" onclick="regresar()">⬅ Regresar</button>

    <header>
        <h1>Bienvenido a Nat Nation</h1>
    </header>

   <button id="btn-carrito" onclick="toggleCarrito()">

<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="black">
  <path d="M6 7V6a6 6 0 1 1 12 0v1h2a1 1 0 0 1 1 1l-1 12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2L3 8a1 1 0 0 1 1-1h2zm2 0h8V6a4 4 0 1 0-8 0v1z"/>
</svg>

<span id="contador">0</span>

</button>

    <section class="productos">

        <div class="producto">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
            <h2>Nike Air Max</h2>
            <p>$250</p>
            <select>
  <option>MX 4</option>
  <option>MX 5</option>
  <option>MX 6</option>
  <option>MX 7</option>
  <option>MX 8</option>
</select>

<button onclick="Agregar(this)">Añadir al carrito</button>
            
        </div>

        <div class="producto">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
            <h2>Adidas Ultraboost</h2>
            <p>$2,800</p>
            <select>
  <option>MX 4</option>
  <option>MX 5</option>
  <option>MX 6</option>
  <option>MX 7</option>
  <option>MX 8</option>
</select>

<button onclick="Agregar(this)">Añadir al carrito</button>
        </div>

        <div class="producto">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
            <h2>Puma RS-X</h2>
            <p>$2,200</p>
            <select>
  <option>MX 4</option>
  <option>MX 5</option>
  <option>MX 6</option>
  <option>MX 7</option>
  <option>MX 8</option>
</select>

<button onclick="Agregar(this)">Añadir al carrito</button>
        </div>

    </section>

</div>


<script src="app.js"></script>

</html>
